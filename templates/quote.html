<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Charter Quotes</title>
<style>body{visibility:hidden}</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a56db;
  --accent: #f59e0b;
  --primary-light: #e8f0fe;
  --white: #ffffff;
  --bg: #f0f4ff;
  --text: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --card-shadow: 0 4px 24px rgba(26,86,219,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HERO */
.hero {
  background: linear-gradient(145deg, var(--primary) 0%, color-mix(in srgb, var(--primary) 70%, #000) 100%);
  padding: 0 0 64px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 48px;
  background: var(--bg);
  border-radius: 48px 48px 0 0;
}
.hero-dots {
  position: absolute;
  bottom: 60px; right: 20px;
  width: 100px; height: 100px;
  background-image: radial-gradient(circle, rgba(255,255,255,0.15) 1.5px, transparent 1.5px);
  background-size: 14px 14px;
  pointer-events: none;
}

/* HEADER */
.header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 20px 22px 28px;
  position: relative; z-index: 2;
}
.logo-wrap { display: flex; align-items: center; gap: 10px; }
.logo-wrap img { height: 38px; border-radius: 8px; }
.logo-text .name { font-size: 0.95rem; font-weight: 800; color: #fff; }
.logo-text .sub { font-size: 0.65rem; color: rgba(255,255,255,0.55); margin-top: 1px; letter-spacing: 0.3px; }
.header-pill {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
}

/* HERO TEXT */
.hero-text {
  position: relative; z-index: 2;
  padding: 0 22px 32px;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.75);
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px;
  margin-bottom: 14px;
}
.hero-tag span { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); display: inline-block; }
.hero-h { font-size: 2.1rem; font-weight: 800; color: #fff; line-height: 1.15; margin-bottom: 10px; }
.hero-h em { font-style: normal; color: rgba(255,255,255,0.55); font-weight: 500; }
.hero-sub { font-size: 0.82rem; color: rgba(255,255,255,0.55); line-height: 1.6; }

/* QUOTE CARD */
.main { max-width: 760px; margin: 0 auto; }
.card-wrap { padding: 0 16px; margin-top: -32px; position: relative; z-index: 3; }
.quote-card {
  background: var(--white);
  border-radius: 20px;
  padding: 22px 20px;
  box-shadow: var(--card-shadow);
}

/* MISSION TABS */
.mission-tabs {
  display: flex; gap: 6px;
  background: var(--bg);
  border-radius: 12px; padding: 4px;
  margin-bottom: 20px;
}
.mtab {
  flex: 1; padding: 9px 6px;
  border-radius: 9px; border: none;
  background: transparent; color: var(--muted);
  cursor: pointer; font-weight: 700;
  font-size: 0.78rem; text-align: center;
  font-family: inherit; transition: all 0.2s;
}
.mtab.active {
  background: var(--white); color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FORM */
.field-group { margin-bottom: 14px; }
.field-label {
  font-size: 0.65rem; font-weight: 700;
  color: var(--muted); display: block;
  margin-bottom: 6px; text-transform: uppercase;
  letter-spacing: 1px;
}
.field-input {
  width: 100%; padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 0.92rem;
  outline: none; font-family: inherit;
  background: var(--bg); color: var(--text);
  transition: all 0.2s;
}
.field-input:focus {
  border-color: var(--primary);
  background: var(--white);
  box-shadow: 0 0 0 4px var(--primary-light);
}
.field-input::placeholder { color: #c4cdd8; font-size: 0.85rem; }
.form-row { display: flex; gap: 10px; }
.form-row .field-group { flex: 1; }

/* SWAP BUTTON */
.swap-row {
  display: flex; align-items: center;
  gap: 8px; margin: -4px 0 10px;
}
.swap-line { flex: 1; height: 1px; background: var(--border); }
.swap-btn {
  width: 30px; height: 30px;
  border-radius: 50%; border: 1.5px solid var(--border);
  background: var(--white); color: var(--primary);
  cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.swap-btn:hover { background: var(--primary-light); border-color: var(--primary); }

/* QUOTE BUTTON */
.btn-quote {
  width: 100%; padding: 15px;
  background: var(--accent);
  color: var(--white); border: none;
  border-radius: 12px; font-size: 0.88rem;
  font-weight: 800; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
  margin-top: 4px; letter-spacing: 0.3px;
  box-shadow: 0 4px 16px rgba(245,158,11,0.35);
}
.btn-quote:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,158,11,0.45); }
.btn-quote:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* LEGS */
.leg-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.leg-row input { flex: 1; min-width: 100px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.85rem; font-family: inherit; outline: none; background: var(--bg); color: var(--text); transition: border-color 0.2s; }
.leg-row input:focus { border-color: var(--primary); background: var(--white); }
.leg-row input::placeholder { color: #c4cdd8; }
.leg-num { font-weight: 800; color: var(--primary); min-width: 16px; font-size: 0.78rem; }
.btn-add-leg { padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--primary); color: var(--primary); background: var(--primary-light); font-size: 0.72rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; margin: 4px 0 12px; }
.btn-add-leg:hover { background: var(--primary); color: var(--white); }

/* RESOLVING */
.resolving-bar { background: var(--primary-light); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 0.8rem; color: var(--primary); display: none; font-weight: 600; }

/* TRUST BAR */
.trust-bar { display: flex; gap: 8px; padding: 16px 16px 4px; flex-wrap: wrap; justify-content: center; }
.trust-item { font-size: 0.7rem; font-weight: 700; color: var(--muted); letter-spacing: 0.3px; display: flex; align-items: center; gap: 5px; padding: 5px 12px; background: var(--white); border-radius: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.trust-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

/* INNER */
.inner { padding: 0 16px 80px; }
.section-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1.5px; background: var(--border); border-radius: 2px; }

/* LOADING */
.loading-card { background: var(--white); border-radius: 16px; padding: 36px 20px; text-align: center; margin: 16px 0; box-shadow: var(--card-shadow); }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--muted); font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

/* RESULT CARDS */
.ac-card { background: var(--white); border-radius: 16px; padding: 20px; margin-bottom: 12px; box-shadow: var(--card-shadow); border: 1.5px solid var(--border); overflow: hidden; position: relative; }
.ac-card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
.ac-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1.5px solid var(--border); }
.ac-title { font-size: 0.92rem; font-weight: 800; color: var(--text); flex: 1; }
.ac-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 700; }
.badge-heli { background: var(--primary-light); color: var(--primary); }
.badge-fixed { background: #fce7f3; color: #9d174d; }

/* ROUTE TABLE */
.route-wrap { overflow-x: auto; margin-bottom: 14px; border-radius: 10px; border: 1.5px solid var(--border); }
.route-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 380px; }
.route-table th { background: var(--primary); color: #fff; padding: 8px 10px; text-align: left; font-weight: 700; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.8px; }
.route-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.route-table tr:last-child td { border-bottom: none; }
.route-table tr:hover td { background: var(--bg); }

/* TAGS */
.tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
.tag-rev { background: #dcfce7; color: #166534; }
.tag-pos { background: #fef9c3; color: #854d0e; }
.tag-dep { background: #fee2e2; color: #991b1b; }
.tag-rep { background: var(--primary-light); color: var(--primary); }
.tag-idle { background: #ffedd5; color: #9a3412; }
.tag-overnight { background: #ede9fe; color: #5b21b6; }

/* BILLING */
.billing { background: var(--bg); border-radius: 12px; padding: 14px 16px; border: 1.5px solid var(--border); }
.billing-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.82rem; border-bottom: 1px solid var(--border); color: var(--muted); }
.billing-row:last-of-type { border-bottom: none; }
.billing-divider { height: 2px; background: var(--primary); margin: 10px 0; opacity: 0.12; border-radius: 2px; }
.billing-total { display: flex; justify-content: space-between; font-weight: 800; font-size: 1rem; color: var(--primary); padding-top: 4px; }

/* OPTION TABS */
.option-tabs { display: flex; gap: 6px; background: var(--bg); border-radius: 10px; padding: 3px; margin-bottom: 12px; }
.otab { flex: 1; padding: 8px 6px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 0.72rem; font-weight: 700; text-align: center; font-family: inherit; transition: all 0.2s; }
.otab.active { background: var(--white); color: var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.otab-content { display: none; }
.otab-content.active { display: block; }

/* BOXES */
.info-box { background: var(--primary-light); border-left: 3px solid var(--primary); color: var(--primary); border-radius: 0 10px 10px 0; padding: 10px 14px; margin: 10px 0; font-size: 0.8rem; line-height: 1.6; font-weight: 500; }
.error-card { background: #fff1f2; border-left: 3px solid #e11d48; color: #be123c; border-radius: 0 10px 10px 0; padding: 14px 16px; margin: 14px 0; font-size: 0.82rem; line-height: 1.6; }
.pickup-drop-msg { background: var(--primary-light); border-left: 3px solid var(--primary); color: var(--primary); border-radius: 0 10px 10px 0; padding: 10px 14px; margin-bottom: 12px; font-size: 0.8rem; line-height: 1.6; font-weight: 500; }
.validity-notice { background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-top: 8px; font-size: 0.72rem; color: var(--muted); text-align: center; font-weight: 500; }
.drop-label { font-size: 0.62rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 10px 0 6px; }

/* CTA */
.cta-block { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.btn-whatsapp { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px; background: #25D366; color: #fff; border: none; border-radius: 12px; font-size: 0.82rem; font-weight: 800; cursor: pointer; font-family: inherit; text-decoration: none; transition: all 0.2s; box-shadow: 0 4px 14px rgba(37,211,102,0.3); letter-spacing: 0.3px; }
.btn-whatsapp:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,211,102,0.4); }
.btn-call { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 13px; background: var(--white); color: var(--primary); border: 2px solid var(--primary); border-radius: 12px; font-size: 0.82rem; font-weight: 800; cursor: pointer; font-family: inherit; text-decoration: none; transition: all 0.2s; letter-spacing: 0.3px; }
.btn-call:hover { background: var(--primary); color: var(--white); }
.btn-reset { padding: 11px; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.btn-reset:hover { border-color: var(--primary); color: var(--primary); }

/* FX */
.fx-widget { background: var(--white); border-radius: 14px; padding: 16px 18px; margin-top: 14px; box-shadow: var(--card-shadow); border: 1.5px solid var(--border); }
.fx-title { font-size: 0.62rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
.fx-input-wrap { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; }
.fx-input-wrap span { font-weight: 800; color: var(--primary); font-size: 0.78rem; letter-spacing: 1px; }
.fx-input-wrap input { border: none; background: transparent; font-size: 1rem; font-weight: 700; flex: 1; outline: none; font-family: inherit; color: var(--text); }
.fx-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.fx-item { background: var(--bg); border-radius: 10px; padding: 10px 12px; border: 1.5px solid var(--border); }
.fx-currency { font-size: 0.6rem; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.fx-amount { font-size: 0.92rem; font-weight: 800; color: var(--text); }
.fx-updated { font-size: 0.62rem; color: #d1d5db; text-align: right; margin-top: 8px; }
.fx-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.fx-row:last-child { border-bottom: none; }
.fx-row-label { color: var(--muted); font-size: 0.78rem; }
.fx-row-amount { font-weight: 800; color: var(--text); font-size: 0.92rem; }

/* FOOTER */
.footer { background: var(--primary); color: rgba(255,255,255,0.45); padding: 32px 20px; text-align: center; font-size: 0.78rem; line-height: 2; }
.footer-company { color: rgba(255,255,255,0.8); font-weight: 800; font-size: 0.92rem; margin-bottom: 4px; }
.footer a { color: rgba(255,255,255,0.35); text-decoration: none; }
.footer-powered { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.65rem; color: rgba(255,255,255,0.3); letter-spacing: 0.3px; }
.footer-powered a { color: rgba(255,255,255,0.45); }

@media(max-width:480px) {
  .hero-h { font-size: 1.75rem; }
  .form-row { flex-direction: column; }
  .fx-grid { grid-template-columns: repeat(2, 1fr); }
  .card-wrap { padding: 0 12px; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="header">
    <div class="logo-wrap">
      <img id="header-logo" src="" alt="">
      <div class="logo-text">
        <div class="name" id="header-company"></div>
        <div class="sub" id="header-tagline"></div>
      </div>
    </div>
    <div class="header-pill" id="header-region">Kenya</div>
  </div>
  <div class="hero-text">
    <div class="hero-tag"><span></span>Private Charter</div>
    <h2 class="hero-h">Where do you<br>want to <em>fly?</em></h2>
    <p class="hero-sub" id="hero-sub">Instant helicopter quotes across Kenya</p>
  </div>
</div>

<div class="main">
  <div class="card-wrap">
    <div class="quote-card" id="quote-card">
      <div id="resolving-bar" class="resolving-bar">📍 Resolving location...</div>
      <div class="mission-tabs">
        <div class="mtab active" onclick="showMission('one_way',this)">One Way</div>
        <div class="mtab" onclick="showMission('return',this)">Return</div>
        <div class="mtab" onclick="showMission('safari',this)">Safari</div>
      </div>

      <div id="m-one_way">
        <div class="field-group">
          <label class="field-label">From</label>
          <input type="text" class="field-input" id="ow-pickup" placeholder="name of place or google map pin">
        </div>
        <div class="swap-row">
          <div class="swap-line"></div>
          <button class="swap-btn" onclick="swapLocations()" title="Swap">⇅</button>
          <div class="swap-line"></div>
        </div>
        <div class="field-group">
          <label class="field-label">To</label>
          <input type="text" class="field-input" id="ow-dropoff" placeholder="name of place or google map pin">
        </div>
        <button class="btn-quote" onclick="submitQuote('one_way')">Get Instant Quote →</button>
      </div>

      <div id="m-return" style="display:none">
        <div class="field-group">
          <label class="field-label">From</label>
          <input type="text" class="field-input" id="rt-pickup" placeholder="Name of place or google maps pin">
        </div>
        <div class="field-group">
          <label class="field-label">To</label>
          <input type="text" class="field-input" id="rt-dropoff" placeholder="Name of place or google maps pin">
        </div>
        <div class="form-row">
          <div class="field-group">
            <label class="field-label">Departure</label>
            <input type="text" class="field-input" id="rt-depart" placeholder="25 Jun 2026">
          </div>
          <div class="field-group">
            <label class="field-label">Return</label>
            <input type="text" class="field-input" id="rt-return" placeholder="28 Jun 2026">
          </div>
        </div>
        <button class="btn-quote" onclick="submitQuote('return')">Get Instant Quote →</button>
      </div>

      <div id="m-safari" style="display:none">
        <div id="safari-legs">
          <div class="leg-row">
            <span class="leg-num">1</span>
            <input type="text" placeholder="Name of place or Google Maps pin" class="leg-origin">
            <input type="text" placeholder="Name of place or Google Maps pin" class="leg-dest">
            <input type="text" placeholder="Date" class="leg-date" style="max-width:100px">
          </div>
        </div>
        <button class="btn-add-leg" onclick="addLeg()">+ Add Leg</button>
        <button class="btn-quote" onclick="submitQuote('safari')">Get Instant Quote →</button>
      </div>
    </div>
  </div>

  <div class="trust-bar" id="trust-bar"></div>

  <div class="inner">
    <div id="loading" style="display:none;margin-top:20px">
      <div class="loading-card">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Calculating</div>
      </div>
    </div>

    <div id="error-box" style="display:none;margin-top:16px"></div>

    <div id="results" style="display:none;margin-top:4px">
      <div class="section-label">Your Quote</div>
      <div id="results-inner"></div>
      <div class="validity-notice" id="validity-notice"></div>

      <div class="fx-widget" id="fx-widget" style="display:none">
        <div class="fx-title">Live Currency Conversion</div>
        <div class="fx-grid" id="fx-grid"></div>
        <div class="fx-updated" id="fx-updated"></div>
      </div>

      <div class="cta-block">
        <a id="btn-whatsapp" class="btn-whatsapp" href="#" target="_blank">

<script>
// Quotecloud Heli Flight v2.5.5 - App skin
let config = {};
let fxRates = {};
let lastResults = [];
let GAPI_KEY = '';

async function init() {
  try {
    let r = await fetch('/settings/config/public');
    config = await r.json();
    let kr = await fetch('/get_maps_key');
    let kd = await kr.json();
    GAPI_KEY = kd.key || '';
applyBranding();
document.body.style.visibility = 'visible';
loadFX();
  } catch(e) { console.error('Init failed:', e); }
}

function applyBranding() {
  let b = config.branding || {};
  let primary = b.primary_color || '#1a56db';
  let accent = b.accent_color || '#f59e0b';
  let primaryLight = hexToRgba(primary, 0.08);
  document.documentElement.style.setProperty('--primary', primary);
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--primary-light', primaryLight);
  document.getElementById('page-title').textContent = (config.company_name||'Charter') + ' — Instant Quotes';
  let logo = document.getElementById('header-logo');
  if (config.logo_url) { logo.src = config.logo_url; logo.alt = config.company_name||''; }
  else logo.style.display = 'none';
  document.getElementById('header-company').textContent = config.company_name||'';
  document.getElementById('header-tagline').textContent = config.tagline||'Private Charter Flights';
  let region = (config.geo_lock||{}).region_name||'Kenya';
  document.getElementById('header-region').textContent = region;
  document.getElementById('hero-sub').textContent = `Instant helicopter quotes across ${region}`;
  let tb = (config.trust_bar||[]).filter(Boolean);
  let tbEl = document.getElementById('trust-bar');
  if (tb.length) tbEl.innerHTML = tb.map(item=>`<div class="trust-item"><span class="trust-dot"></span>${item}</div>`).join('');
  else tbEl.style.display = 'none';
  let wa = (config.contact||{}).whatsapp||'';
  let phone = (config.contact||{}).phone||'';
  let greeting = (config.contact||{}).whatsapp_greeting||"Hi, I'd like to enquire about a charter flight.";
  if (wa) document.getElementById('btn-whatsapp').href = `https://wa.me/${wa}?text=${encodeURIComponent(greeting)}`;
  else document.getElementById('btn-whatsapp').style.display = 'none';
  if (phone) document.getElementById('btn-call').href = `tel:${phone}`;
  else document.getElementById('btn-call').style.display = 'none';
  let c = config.contact||{};
  document.getElementById('footer-company').textContent = config.company_name||'';
  let parts = [c.address, c.email, c.phone].filter(Boolean);
  document.getElementById('footer-contact').innerHTML = parts.join(' &nbsp;·&nbsp; ');
  if (config.footer_tagline) {
    let ft = document.createElement('div');
    ft.style.cssText = 'margin-top:6px;color:rgba(255,255,255,0.4);font-size:0.72rem';
    ft.textContent = config.footer_tagline;
    document.getElementById('site-footer').insertBefore(ft, document.querySelector('.footer-powered'));
  }
}

function hexToRgba(hex, alpha) {
  try {
    let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  } catch(e) { return 'rgba(26,86,219,0.08)'; }
}

async function loadFX() {
  try {
    let r = await fetch('/fx/rates');
    let data = await r.json();
    if (data.success) {
      fxRates = data.rates;
      if (data.updated) document.getElementById('fx-updated').textContent = 'Rates: ' + new Date(data.updated).toLocaleDateString();
    }
  } catch(e) {}
}

function updateFX() {
  let usd = parseFloat(document.getElementById('fx-input').value)||0;
  let currencies = ['KES','EUR','GBP','TZS','UGX'];
  document.getElementById('fx-grid').innerHTML = currencies.map(c=>{
    let rate = fxRates[c]||0;
    let amount = usd*rate;
    let fmt = amount>=1000?amount.toLocaleString(undefined,{maximumFractionDigits:0}):amount.toLocaleString(undefined,{maximumFractionDigits:2});
    return `<div class="fx-item"><div class="fx-currency">${c}</div><div class="fx-amount">${fmt}</div></div>`;
  }).join('');
}

function swapLocations() {
  let p = document.getElementById('ow-pickup');
  let d = document.getElementById('ow-dropoff');
  let tmp = p.value; p.value = d.value; d.value = tmp;
}

function isMapsUrl(s) {
  return s && (s.includes('maps.app.goo.gl')||s.includes('goo.gl')||s.includes('google.com/maps')||s.includes('maps.google'));
}

function extractCoordsFromUrl(url) {
  let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
  let m2 = url.match(/!3d(-?\d+\.\d+).*?!4d(-?\d+\.\d+)/);
  if (m2) return { lat: parseFloat(m2[1]), lng: parseFloat(m2[2]) };
  let m3 = url.match(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
  if (m3) return { lat: parseFloat(m3[1]), lng: parseFloat(m3[2]) };
  return null;
}

async function reverseGeocode(lat, lng) {
  if (!GAPI_KEY) return `${lat},${lng}`;
  try {
    let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&key=${GAPI_KEY}&region=ke`);
    let data = await r.json();
    if (data.status==='OK') {
      let components = data.results[0].address_components;
      let locality = components.find(c=>c.types.includes('locality'));
      let admin = components.find(c=>c.types.includes('administrative_area_level_1'));
      if (locality&&admin) return `Pin, ${locality.long_name}, ${admin.long_name}`;
      if (locality) return `Pin, ${locality.long_name}`;
      let addr = data.results[0].formatted_address;
      if (addr&&!addr.includes('+')) return `Pin, ${addr}`;
    }
  } catch(e) {}
  return `Pin, ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
}

async function resolveMapsShortUrl(url) {
  try {
    let proxyRes = await fetch('/expand_maps_url', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url}), signal:AbortSignal.timeout(8000)
    });
    let proxyData = await proxyRes.json();
    let finalUrl = proxyData.final_url || '';
    if (finalUrl) {
      let coords = extractCoordsFromUrl(finalUrl);
      if (coords) {
        let display = await reverseGeocode(coords.lat, coords.lng);
        return { coords:`${coords.lat},${coords.lng}`, display };
      }
    }
    let ftidMatch = finalUrl.match(/ftid=([^&]+)/);
    if (ftidMatch && GAPI_KEY) {
      let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?place_id=${encodeURIComponent(ftidMatch[1])}&key=${GAPI_KEY}`);
      let data = await r.json();
      if (data.status==='OK') {
        let loc = data.results[0].geometry.location;
        let display = await reverseGeocode(loc.lat, loc.lng);
        return { coords:`${loc.lat},${loc.lng}`, display };
      }
    }
    let expandedObj = finalUrl ? new URL(finalUrl) : new URL(url);
    let q = expandedObj.searchParams.get('q')||expandedObj.searchParams.get('query')||'';
    if (!q) {
      let pathMatch = url.match(/place\/([^\/\?@]+)/);
      if (pathMatch) q = decodeURIComponent(pathMatch[1].replace(/\+/g,' '));
    }
    if (q && GAPI_KEY) {
      let region = (config.geo_lock||{}).region_name||'Kenya';
      let query = q.toLowerCase().includes(region.toLowerCase()) ? q : `${q} ${region}`;
      let r = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${GAPI_KEY}&region=ke`);
      let data = await r.json();
      if (data.status==='OK') {
        let loc = data.results[0].geometry.location;
        let display = await reverseGeocode(loc.lat, loc.lng);
        return { coords:`${loc.lat},${loc.lng}`, display };
      }
    }
  } catch(e) {}
  return null;
}

async function resolveLocationClientSide(input) {
  if (!input||!input.trim()) return null;
  let s = input.trim();
  if (isMapsUrl(s)) {
    let coords = extractCoordsFromUrl(s);
    if (coords) {
      let display = await reverseGeocode(coords.lat, coords.lng);
      return { resolved:`${coords.lat},${coords.lng}`, display };
    }
    let resolved = await resolveMapsShortUrl(s);
    if (resolved) return { resolved:resolved.coords, display:resolved.display };
    return null;
  }
  return { resolved:s, display:s };
}

function showMission(m, el) {
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['one_way','return','safari'].forEach(id=>{
    document.getElementById('m-'+id).style.display = id===m?'block':'none';
  });
}

function parseSmartDate(s) {
  s = s.trim().replace(/(\d+)(st|nd|rd|th)/gi,'$1');
  const fmts = [
    { r:/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/, fn:m=>{ let y=m[3].length===2?'20'+m[3]:m[3]; return new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`); }},
    { r:/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/, fn:m=>new Date(`${m[2]} ${m[1]} ${m[3]}`) },
    { r:/^([A-Za-z]+)\s+(\d{1,2})\s+(\d{4})$/, fn:m=>new Date(`${m[1]} ${m[2]} ${m[3]}`) },
  ];
  for (let f of fmts) {
    let m = s.match(f.r);
    if (m) {
      let d = f.fn(m);
      if (!isNaN(d)) {
        let dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0'), yy=String(d.getFullYear()).slice(-2);
        return `${dd}/${mm}/${yy}`;
      }
    }
  }
  return s;
}

function addLeg() {
  let n = document.querySelectorAll('#safari-legs .leg-row').length + 1;
  let div = document.createElement('div');
  div.className = 'leg-row';
  div.innerHTML = `<span class="leg-num">${n}</span>
    <input type="text" placeholder="From" class="leg-origin">
    <input type="text" placeholder="To" class="leg-dest">
    <input type="text" placeholder="Date" class="leg-date" style="max-width:100px">
    <button onclick="this.parentElement.remove()" style="padding:5px 9px;border:1.5px solid #fee2e2;background:#fff1f2;color:#e11d48;border-radius:8px;cursor:pointer;font-size:0.8rem;font-weight:700">✕</button>`;
  document.getElementById('safari-legs').appendChild(div);
}

function showResolving(show) {
  document.getElementById('resolving-bar').style.display = show ? 'block' : 'none';
}

async function submitQuote(mission) {
  let body = { mission };
  showLoading(true, 'Calculating');
  hideError();
  document.getElementById('results').style.display = 'none';
  try {
    if (mission==='one_way') {
      let rawP = document.getElementById('ow-pickup').value.trim();
      let rawD = document.getElementById('ow-dropoff').value.trim();
      if (!rawP||!rawD) { showLoading(false); return showError('Please enter both From and To locations.'); }
      showResolving(true);
      let p = await resolveLocationClientSide(rawP);
      let d = await resolveLocationClientSide(rawD);
      showResolving(false);
      body.pickup = (p&&isMapsUrl(rawP)) ? p.resolved : rawP;
      body.dropoff = (d&&isMapsUrl(rawD)) ? d.resolved : rawD;
    } else if (mission==='return') {
      let rawP = document.getElementById('rt-pickup').value.trim();
      let rawD = document.getElementById('rt-dropoff').value.trim();
      if (!rawP||!rawD) { showLoading(false); return showError('Please enter both From and To locations.'); }
      showResolving(true);
      let p = await resolveLocationClientSide(rawP);
      let d = await resolveLocationClientSide(rawD);
      showResolving(false);
      body.pickup = (p&&isMapsUrl(rawP)) ? p.resolved : rawP;
      body.dropoff = (d&&isMapsUrl(rawD)) ? d.resolved : rawD;
      body.depart = parseSmartDate(document.getElementById('rt-depart').value);
      body.return_date = parseSmartDate(document.getElementById('rt-return').value);
      if (!body.depart||!body.return_date) { showLoading(false); return showError('Please enter departure and return dates.'); }
    } else {
      body.legs = [];
      let rows = document.querySelectorAll('#safari-legs .leg-row');
      showResolving(true);
      for (let row of rows) {
        let rawO = row.querySelector('.leg-origin').value.trim();
        let rawD2 = row.querySelector('.leg-dest').value.trim();
        let dt = parseSmartDate(row.querySelector('.leg-date').value);
        if (rawO&&rawD2) {
          let o = await resolveLocationClientSide(rawO);
          let d2 = await resolveLocationClientSide(rawD2);
          body.legs.push({ origin:(o&&isMapsUrl(rawO))?o.resolved:rawO, destination:(d2&&isMapsUrl(rawD2))?d2.resolved:rawD2, date:dt });
        }
      }
      showResolving(false);
      if (!body.legs.length) { showLoading(false); return showError('Please add at least one leg.'); }
    }
    showLoading(true, 'Calculating');
    let r = await fetch('/quote/calculate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    let data = await r.json();
    showLoading(false);
    if (!r.ok) { showError(data.error||'Unable to calculate. Please try again.'); return; }
    lastResults = data.results||[];
    renderResults(lastResults, mission);
  } catch(e) {
    showLoading(false); showResolving(false);
    showError('Network error. Please check your connection and try again.');
  }
}

function showLoading(show, text) {
  document.getElementById('loading').style.display = show?'block':'none';
  if (text) document.getElementById('loading-text').textContent = text;
}

function showError(msg) {
  let el = document.getElementById('error-box');
  el.innerHTML = `<div class="error-card">${msg}</div>`;
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth',block:'center'});
}

function hideError() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('error-box').innerHTML = '';
}

function tagClass(t, note) {
  if (note) return note.toLowerCase().includes('idle')?'tag-idle':'tag-overnight';
  return t==='revenue'?'tag-rev':t==='positioning'?'tag-pos':t==='depositioning'?'tag-dep':'tag-rep';
}

function renderSegments(segs, showDist) {
  if (!segs||!segs.length) return '';
  let rows = segs.map(s=>{
    let isNote = s.note&&!s.type;
    if (isNote) {
      let label = s.note.toLowerCase().includes('idle')?'Idle Day':'Overnight';
      let cost = s.cost?`$${parseFloat(s.cost).toLocaleString(undefined,{minimumFractionDigits:2})}`:'—';
      return `<tr><td><span class="tag ${tagClass(null,s.note)}">${label}</span></td><td colspan="2" style="color:#9ca3af;font-size:0.75rem">${s.note}</td>${showDist?'<td>—</td>':''}<td style="font-weight:700">${cost}</td><td>—</td></tr>`;
    }
    let nm = s.nm||s.dist_nm||0;
    return `<tr><td><span class="tag ${tagClass(s.type,null)}">${s.type}</span></td><td>${s.origin||''}</td><td>${s.destination||''}</td>${showDist?`<td>${nm?nm+' nm':'—'}</td>`:''}<td>${s.hours?fmtHours(s.hours):'—'}</td><td>${s.date||'—'}</td></tr>`;
  }).join('');
  let dh = showDist?'<th>Dist</th>':'';
  return `<div class="route-wrap"><table class="route-table"><thead><tr><th>Type</th><th>From</th><th>To</th>${dh}<th>Hours</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function fmtHours(h) {
  h = parseFloat(h) || 0;
  let totalMins = Math.ceil(h * 60);
  if (totalMins < 60) return totalMins + ' mins';
  let hrs = Math.floor(totalMins / 60);
  let mins = totalMins % 60;
  if (mins === 0) return hrs + ' hr' + (hrs !== 1 ? 's' : '');
  return hrs + ' hr ' + mins + ' mins';
}

function calcHours(segs) {
  let t=0; (segs||[]).forEach(s=>{if(s.hours&&s.type)t+=parseFloat(s.hours);}); return Math.round(t*10)/10;
}

function renderBilling(res) {
  let rate=res.rate_usd||0, hrs=calcHours(res.segments||[]), rows='';
  if (hrs>0&&rate>0) {
    let fc=Math.round(hrs*rate*100)/100;
    let minHrs=res.min_chargeable_hrs||0; let minMsg=(minHrs>0&&res.min_applied)?`<div style="font-size:0.75rem;color:#e65100;background:#fff3e0;border-radius:6px;padding:5px 10px;margin-bottom:6px">Minimum charge of ${minHrs.toFixed(1)} flight hours applies. Quote reflects minimum billable hours.</div>`:""; rows+=minMsg+`<div class="billing-row"><span>Aircraft Charter <span style="color:#9ca3af;font-size:0.75rem">${hrs}hrs @ $${rate.toLocaleString()}/hr</span></span><span>$${fc.toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  let fee=res.pax_fee_usd||res.pax_fee_usd_display||0;
  if (fee>0) rows+=`<div class="billing-row"><span>Taxes & Admin</span><span>$${parseFloat(fee).toLocaleString()}</span></div>`;
  let ov=res.overnight_usd||res.overnight_cost_usd||0, oRate=res.overnight_rate_usd||0;
  if (ov>0&&oRate>0) {
    let n=Math.round(ov/oRate);
    rows+=`<div class="billing-row"><span>Overnight Per Diem <span style="color:#9ca3af;font-size:0.75rem">${n} night${n!==1?'s':''} @ $${oRate}</span></span><span>$${parseFloat(ov).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  let wu=res.waiting_usd||res.idle_cost_usd||0, ir=res.idle_day_rate_usd||0;
  if (wu>0) {
    let days=ir>0?Math.round(wu/ir):1;
    rows+=`<div class="billing-row"><span>Idle Day <span style="color:#9ca3af;font-size:0.75rem">${days} day${days!==1?'s':''} @ $${ir.toLocaleString()}</span></span><span>$${parseFloat(wu).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div>`;
  }
  return `<div class="billing">${rows}<div class="billing-divider"></div><div class="billing-total"><span>Total Estimate</span><span>USD $${(res.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}</span></div></div>`;
}

function renderOneAc(res, showDist) {
  if (res.error) return `<div class="error-card">${res.error}</div>`;
  let badge = res.ac_type==='fixed_wing'?`<span class="ac-badge badge-fixed">✈ Fixed Wing</span>`:`<span class="ac-badge badge-heli">🚁 Helicopter</span>`;
  let disclaimer = res.ac_type==='fixed_wing'?`<div class="info-box">${config.landing_field_disclaimer||'Fixed wing aircraft. Runway required. Contact us to confirm suitability.'}</div>`:'';
  let content='';
  if (res.mission==='return_both') {
    let wd=res.wait_days, maxN=res.max_nights||3;
    if (wd>=maxN) {
      let b=res.option_b;
      let bRes={segments:[...(b.drop.segments||[]),...(b.pick.segments||[])],rate_usd:res.rate_usd,overnight_rate_usd:res.overnight_rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display,total_usd:b.total_usd};
      content=`<div class="pickup-drop-msg">${res.pickup_drop_msg||'Pick & Drop applies.'}</div><div class="drop-label">Drop Off</div>${renderSegments(b.drop.segments,showDist)}<div class="drop-label">Pick Up</div>${renderSegments(b.pick.segments,showDist)}${renderBilling(bRes)}`;
    } else {
      let aRes={...res.option_a,rate_usd:res.rate_usd,overnight_rate_usd:res.overnight_rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display};
      let bRes2={segments:[...(res.option_b.drop.segments||[]),...(res.option_b.pick.segments||[])],rate_usd:res.rate_usd,idle_day_rate_usd:res.idle_day_rate_usd,pax_fee_usd_display:res.pax_fee_usd_display,total_usd:res.option_b.total_usd};
      content=`<div class="info-box">Aircraft availability subject to schedule. Review both options.</div>
        <div class="option-tabs"><div class="otab active" onclick="switchOtab(this,'oa-${res.ac_key}')">Option A — Waits</div><div class="otab" onclick="switchOtab(this,'ob-${res.ac_key}')">Option B — Pick & Drop</div></div>
        <div class="otab-content active" id="oa-${res.ac_key}">${renderSegments(res.option_a.segments,showDist)}${renderBilling(aRes)}</div>
        <div class="otab-content" id="ob-${res.ac_key}"><div class="drop-label">Drop Off</div>${renderSegments(res.option_b.drop.segments,showDist)}<div class="drop-label">Pick Up</div>${renderSegments(res.option_b.pick.segments,showDist)}${renderBilling(bRes2)}</div>`;
    }
  } else {
    content = renderSegments(res.segments,showDist)+renderBilling(res);
  }
  return `<div class="ac-card-accent"></div><div class="ac-header"><div class="ac-title">${res.ac_label||''}</div>${badge}</div>${content}${disclaimer}`;
}

function switchOtab(el, id) {
  let parent=el.closest('.ac-card');
  parent.querySelectorAll('.otab').forEach(t=>t.classList.remove('active'));
  parent.querySelectorAll('.otab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function renderResults(results, mission) {
  let showDist=(config.quoting_rules||{}).show_distance_to_client||false;
  document.getElementById('results-inner').innerHTML = results.map(res=>`<div class="ac-card">${renderOneAc(res,showDist)}</div>`).join('');
  let hours=(config.quoting_rules||{}).quote_validity_hours||48;
  document.getElementById('validity-notice').textContent=`Quote valid for ${hours} hours. Subject to availability.`;
  if (results.length && fxRates['KES']) {
    let kesRate = fxRates['KES'];
    document.getElementById('fx-grid').innerHTML = results.filter(r=>!r.error).map(res=>{
      let total = res.mission==='return_both'?(res.option_a?.total_usd||0):(res.total_usd||0);
      let kes = Math.round(total * kesRate).toLocaleString();
      return `<div class="fx-row"><span class="fx-row-label">${res.ac_label||''}</span><span class="fx-row-amount">KES ${kes}</span></div>`;
    }).join('');
    document.getElementById('fx-widget').style.display='block';
  }
  buildWhatsApp(results, mission);
  document.getElementById('results').style.display='block';
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function buildWhatsApp(results, mission) {
  let wa=(config.contact||{}).whatsapp||'';
  if (!wa) return;
  let greeting=(config.contact||{}).whatsapp_greeting||"Hi, I'd like to enquire about a charter quote.";
  let lines=[greeting,''];
  results.forEach(res=>{
    if (res.error) return;
    lines.push(`*${res.ac_label}*`);
    if (res.mission==='return_both') {
      let wd=res.wait_days, maxN=res.max_nights||3;
      if (wd>=maxN) {
        let b=res.option_b;
        lines.push(`Pick & Drop — USD $${(b.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        (b.drop?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`Drop: ${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
        (b.pick?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`Pick: ${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
      } else {
        lines.push(`Option A (Waits) — USD $${(res.option_a?.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        lines.push(`Option B (Pick & Drop) — USD $${(res.option_b?.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
        (res.option_a?.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
      }
    } else {
      lines.push(`USD $${(res.total_usd||0).toLocaleString(undefined,{minimumFractionDigits:2})}`);
      (res.segments||[]).filter(s=>s.type==='revenue').forEach(s=>lines.push(`${s.origin} → ${s.destination}${s.date?' on '+s.date:''}`));
    }
    lines.push('');
  });
  lines.push('Please confirm availability. Thank you.');
  document.getElementById('btn-whatsapp').href=`https://wa.me/${wa}?text=${encodeURIComponent(lines.join('\n'))}`;
}

function resetQuote() {
  document.getElementById('results').style.display='none';
  hideError(); lastResults=[];
  ['ow-pickup','ow-dropoff','rt-pickup','rt-dropoff','rt-depart','rt-return'].forEach(id=>{
    let el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('quote-card').scrollIntoView({behavior:'smooth',block:'start'});
}

init();
</script>
</body>
</html>
